# =============================================================================
# Deploy Frontend → Azure Web App (onera-orchd-frontend)
# Builds Next.js standalone output, deploys as folder
# =============================================================================
name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "packages/frontend/**"
      - "packages/shared/**"
      - "pnpm-lock.yaml"
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: false

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.15.0"

jobs:
  deploy:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @onera/shared run build

      - name: Build frontend (Next.js standalone)
        env:
          NEXT_PUBLIC_BACKEND_URL: https://orchestrator-api.onera.chat
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: /login
          NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: /dashboard
          NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: /new
          NEXT_PUBLIC_CLERK_AFTER_SIGN_OUT_URL: /home
          NEXT_TELEMETRY_DISABLED: 1
        run: pnpm --filter @onera/frontend run build

      - name: Prepare deployment package
        run: |
          STANDALONE=packages/frontend/.next/standalone

          # Copy static assets into standalone (monorepo mirrors repo structure)
          STATIC_DEST="$STANDALONE/packages/frontend/.next/static"
          mkdir -p "$STATIC_DEST"
          cp -r packages/frontend/.next/static/. "$STATIC_DEST/"

          # Copy public dir if it exists
          if [ -d packages/frontend/public ]; then
            cp -r packages/frontend/public \
              "$STANDALONE/packages/frontend/public"
          fi

          # The standalone dir IS the deploy package
          # Startup command: node packages/frontend/server.js
          echo "Deploy dir size: $(du -sh $STANDALONE | cut -f1)"
          ls "$STANDALONE"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: onera-orchd-frontend
          publish-profile: ${{ secrets.AZURE_WEBAPP_FRONTEND_PUBLISH_PROFILE }}
          package: packages/frontend/.next/standalone
