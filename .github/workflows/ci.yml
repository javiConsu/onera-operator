# =============================================================================
# CI — Type-check and build on every PR and push to develop
# =============================================================================
name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9.15.0"

jobs:
  build:
    name: Build & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: |
          pnpm --filter @onera/database run generate
          pnpm --filter @onera/database run build
          pnpm --filter @onera/shared run build
          pnpm --filter @onera/ai run build
          pnpm --filter @onera/tools run build
          pnpm --filter @onera/agents run build
          pnpm --filter @onera/backend run build
          pnpm --filter @onera/frontend run build
        env:
          NEXT_PUBLIC_BACKEND_URL: https://orchestrator-api.onera.chat
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: /login
          NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: /dashboard
          NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: /new
          NEXT_PUBLIC_CLERK_AFTER_SIGN_OUT_URL: /home
