# =============================================================================
# Deploy Backend → Azure Web App (onera-orchd-backend)
# =============================================================================
name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "packages/backend/**"
      - "packages/database/**"
      - "packages/ai/**"
      - "packages/agents/**"
      - "packages/tools/**"
      - "packages/shared/**"
      - "pnpm-lock.yaml"
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.15.0"

jobs:
  deploy:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all backend packages
        run: |
          pnpm --filter @onera/database run generate
          pnpm --filter @onera/database run build
          pnpm --filter @onera/shared run build
          pnpm --filter @onera/ai run build
          pnpm --filter @onera/tools run build
          pnpm --filter @onera/agents run build
          pnpm --filter @onera/backend run build

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # Wake up Neon DB (free tier suspends after inactivity)
          echo "SELECT 1" | pnpm --filter @onera/database exec prisma db execute --url "$DATABASE_URL" --stdin || true
          sleep 3
          # Run migrations with retry
          pnpm --filter @onera/database exec prisma migrate deploy || \
            (echo "Retry after 10s..." && sleep 10 && pnpm --filter @onera/database exec prisma migrate deploy)

      - name: Prepare deployment package
        run: |
          mkdir -p deploy/packages

          # Copy built workspace packages (dist + package.json)
          for pkg in database shared ai tools agents backend; do
            mkdir -p deploy/packages/$pkg
            cp -r packages/$pkg/dist deploy/packages/$pkg/dist
            cp packages/$pkg/package.json deploy/packages/$pkg/
          done

          # Copy prisma schema (needed by @prisma/client at runtime)
          cp -r packages/database/prisma deploy/packages/database/prisma

          # Copy root package.json and pnpm workspace config
          cp package.json deploy/
          cp pnpm-workspace.yaml deploy/
          cp pnpm-lock.yaml deploy/

          # Copy node_modules (all resolved workspace + external deps)
          cp -r node_modules deploy/node_modules

          # Copy each package's node_modules if they exist
          for pkg in database shared ai tools agents backend; do
            if [ -d "packages/$pkg/node_modules" ]; then
              cp -r packages/$pkg/node_modules deploy/packages/$pkg/node_modules
            fi
          done

          echo "Deploy dir size: $(du -sh deploy | cut -f1)"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: onera-orchd-backend
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy
