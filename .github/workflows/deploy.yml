# =============================================================================
# Deploy — Backend to Azure Web App, Frontend to Azure Static Web App
# =============================================================================
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9.15.0"

jobs:
  # ---------------------------------------------------------------------------
  # Backend → Azure Web App (onera-prod-backend)
  # Build all packages, run migrations, deploy via publish profile
  # ---------------------------------------------------------------------------
  backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: |
          pnpm --filter @onera/database run generate
          pnpm --filter @onera/database run build
          pnpm --filter @onera/shared run build
          pnpm --filter @onera/ai run build
          pnpm --filter @onera/tools run build
          pnpm --filter @onera/agents run build
          pnpm --filter @onera/backend run build

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm --filter @onera/database exec prisma migrate deploy

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: onera-prod-backend
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          # Deploy only what the server needs to run — no src, no tests
          package: .

  # ---------------------------------------------------------------------------
  # Frontend → Azure Static Web App (onera-prod-frontend)
  # Build Next.js with production env vars, deploy via SWA action
  # ---------------------------------------------------------------------------
  frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @onera/shared run build

      - name: Build frontend
        env:
          NEXT_PUBLIC_BACKEND_URL: https://orchestrator-api.onera.chat
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: /login
          NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: /dashboard
          NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: /new
          NEXT_PUBLIC_CLERK_AFTER_SIGN_OUT_URL: /home
        run: pnpm --filter @onera/frontend run build

      - name: Deploy to Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: packages/frontend
          output_location: .next
          skip_app_build: true
